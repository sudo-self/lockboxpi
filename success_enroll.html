<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>lockboxPRO Enrolled</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            color: #fff;
            background-color: #111;
            overflow: hidden;
        }
        
        .bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            /* Updated to relative path */
            background: url('/dumps/trixie.webp') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: -1;
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(30, 30, 30, 0.9);
            padding: 40px 25px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.1);
            width: 100%;
            max-width: 380px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.6);
        }

        h1 { margin: 0 0 8px 0; font-size: 26px; font-weight: 700; letter-spacing: -0.5px; }
        p { margin: 0 0 24px 0; font-size: 15px; color: #aaa; line-height: 1.4; }

        .udid-box {
            background: #000;
            color: #30d158; /* iOS Green for visibility */
            padding: 18px;
            border-radius: 14px;
            font-family: ui-monospace, SFMono-Regular, SF Mono, Menlo, monospace;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 28px;
            border: 1px solid #222;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 16px 0;
            border-radius: 14px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            transition: transform 0.1s ease, background 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .btn:active { transform: scale(0.96); }

        .btn-copy { background: #007aff; }
        .btn-copy:active { background: #0056b3; }
        
        .btn-exit { background: #2c2c2e; }
        .btn-exit:active { background: #1c1c1e; }

    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="card">
            <h1>📱 lockboxPRO 📱</h1>
            <p>Your iPhone has been successfully linked to the servicing station.</p>
            
            <div class="udid-box" id="udid-display">Loading UDID...</div>

            <div class="btn-row">
                <button class="btn btn-copy" onclick="copyUDID()" id="copyBtn">Copy UDID</button>
                <button class="btn btn-exit" onclick="window.location.href='https://google.com';">Finish</button>
            </div>
        </div>
    </div>

    <script>
        // Fetch UDID using relative path and cache-buster
        const udidDisplay = document.getElementById('udid-display');
        
        fetch('/dumps/last_enrolled_udid.txt?t=' + Date.now())
            .then(response => {
                if (!response.ok) throw new Error('Not found');
                return response.text();
            })
            .then(text => {
                const cleanText = text.trim();
                udidDisplay.innerText = cleanText || 'No UDID available';
            })
            .catch(err => {
                console.error(err);
                udidDisplay.innerText = 'Error: Record not found';
                udidDisplay.style.color = '#ff453a'; // iOS Red
            });

        async function copyUDID() {
            const text = udidDisplay.innerText;
            if (!text || text.includes('Loading') || text.includes('Error')) return;

            try {
                // Primary Method: Clipboard API
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    // Fallback for non-HTTPS or older iOS Safari
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    textArea.style.left = "-9999px";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
                showCopied();
            } catch (err) {
                alert('Could not copy automatically. Please select the text manually.');
            }
        }

        function showCopied() {
            const btn = document.getElementById('copyBtn');
            const originalText = btn.innerText;
            btn.innerText = 'Copied!';
            btn.style.background = '#30d158';
            setTimeout(() => {
                btn.innerText = originalText;
                btn.style.background = '#007aff';
            }, 2000);
        }
    </script>
</body>
</html>
