<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>lockboxPRO Enrolled</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, sans-serif;
            color: #fff;
            background-color: #111;
        }
        
        .bg {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: url('https://lbpi.jessejesse.com/dumps/trixie.gif') no-repeat center center;
            background-size: cover;
            z-index: -2;
        }
        
        .overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.65);
            z-index: -1;
        }

        .wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: rgba(30, 30, 30, 0.85); /* Removed the blur filter that crashes iOS Safari */
            padding: 35px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.15);
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }

        h1 { margin: 0 0 10px 0; font-size: 24px; }
        p { margin: 0 0 25px 0; font-size: 15px; color: #ccc; }

        .udid-box {
            background: #000;
            color: #fff;
            padding: 15px;
            border-radius: 10px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            margin-bottom: 25px;
            border: 1px solid #333;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        .btn {
            flex: 1;
            padding: 14px 0;
            border-radius: 12px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            color: #fff;
            -webkit-appearance: none;
        }

        .btn-copy { background: #0a84ff; }
        .btn-copy:active { background: #006ee6; }
        
        .btn-exit { background: #333; }
        .btn-exit:active { background: #444; }

    </style>
</head>
<body>

    <div class="bg"></div>
    <div class="overlay"></div>

    <div class="wrapper">
        <div class="card">
            <h1>📱 iPhone UDID 📱</h1>
            <p>Your iPhone UDID has been successfully secured to <strong>lockboxPRO</strong>.</p>
            
            <div class="udid-box" id="udid-display">Fetching...</div>

            <div class="btn-row">
                <button class="btn btn-copy" onclick="copyUDID()" id="copyBtn">Copy</button>
                <button class="btn btn-exit" onclick="window.close();">Exit</button>
            </div>
        </div>
    </div>

    <script>
        // Cache buster added so iOS Safari doesn't pull a stale UDID from cache
        fetch('https://lbpi.jessejesse.com/dumps/last_enrolled_udid.txt?t=' + Date.now())
            .then(r => r.text())
            .then(t => {
                document.getElementById('udid-display').innerText = t.trim() || 'No UDID found';
            })
            .catch(e => {
                document.getElementById('udid-display').innerText = 'Error loading UDID';
            });

        function copyUDID() {
            var text = document.getElementById('udid-display').innerText;
            if (text && text !== 'Fetching...' && text !== 'Error loading UDID') {
                if (navigator.clipboard && window.isSecureContext) {
                    navigator.clipboard.writeText(text).then(showCopied);
                } else {
                    // Fallback for iOS Safari strict mode
                    var textArea = document.createElement("textarea");
                    textArea.value = text;
                    textArea.style.position = "fixed";
                    document.body.appendChild(textArea);
                    textArea.focus();
                    textArea.select();
                    try {
                        document.execCommand('copy');
                        showCopied();
                    } catch (err) {}
                    document.body.removeChild(textArea);
                }
            }
        }

        function showCopied() {
            var btn = document.getElementById('copyBtn');
            btn.innerText = 'Copied!';
            btn.style.background = '#30d158';
            setTimeout(function() {
                btn.innerText = 'Copy';
                btn.style.background = '#0a84ff';
            }, 2000);
        }
    </script>
</body>
</html>
