<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>lockboxPRO Enrolled</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background-color: #000;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), 
                        url('https://lbpi.jessejesse.com/dumps/trixie.gif') no-repeat center center;
            background-size: cover;
            text-align: center;
            overflow: hidden;
        }

        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 40px 20px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            max-width: 90%;
            width: 400px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            font-size: 16px;
            opacity: 0.9;
            line-height: 1.5;
            margin-bottom: 30px;
        }

        .udid-box {
            background: rgba(0, 0, 0, 0.4);
            padding: 12px;
            border-radius: 8px;
            font-family: monospace;
            font-size: 14px;
            margin-bottom: 25px;
            word-break: break-all;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn-group {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .btn {
            flex: 1;
            padding: 16px 0;
            background: #007aff;
            color: #fff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.2s, background 0.2s;
            cursor: pointer;
            border: none;
        }

        .btn:active {
            transform: scale(0.96);
            background: #0063ce;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.15);
        }
        
        .btn-secondary:active {
            background: rgba(255, 255, 255, 0.25);
        }

        .footer-note {
            margin-top: 30px;
            color: rgba(255, 255, 255, 0.5);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>📱 iPhone UDID 📱</h1>
        <p>Your iPhone UDID has been successfully secured to <strong>lockboxPRO</strong>.</p>
        
        <div class="udid-box" id="udid-display">
            Fetching...
        </div>

        <div class="btn-group">
            <button class="btn" onclick="copyUDID()" id="copyBtn">Copy</button>
            <button class="btn btn-secondary" onclick="window.close();">Exit</button>
        </div>

        <div class="footer-note">
            Close this window to return to Safari.
        </div>
    </div>

    <script>
        // Fetch the UDID from the server text file asynchronously
        fetch('https://lbpi.jessejesse.com/dumps/last_enrolled_udid.txt')
            .then(response => response.text())
            .then(data => {
                document.getElementById('udid-display').innerText = data.trim();
            })
            .catch(error => {
                document.getElementById('udid-display').innerText = 'Could not load UDID.';
            });

        function copyUDID() {
            var udidText = document.getElementById('udid-display').innerText;
            if(udidText && udidText !== 'Fetching...' && udidText !== 'Could not load UDID.') {
                navigator.clipboard.writeText(udidText).then(function() {
                    var btn = document.getElementById('copyBtn');
                    btn.innerText = 'Copied!';
                    btn.style.background = '#28a745';
                    setTimeout(function() {
                        btn.innerText = 'Copy';
                        btn.style.background = '#007aff';
                    }, 2000);
                });
            }
        }
    </script>
</body>
</html>
