<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LockboxPi | Tectonic Utility</title>
    <style>
        :root {
            --base-crust: #0f1012;
            --plate-surface: #1a1c20;
            --plate-highlight: #282a2f;
            --plate-shadow: #08090a;
            --accent-core: #ff9d00;
            --accent-glow: rgba(255, 157, 0, 0.3);
            --danger-core: #ff4444;
            --safe-core: #00ffa2;
            --text-primary: #e2e4e9;
            --text-dim: #5d626f;
            --bevel-outer: 2px 2px 5px var(--plate-shadow), -1px -1px 3px var(--plate-highlight);
            --bevel-inner: inset 2px 2px 4px var(--plate-shadow), inset -1px -1px 2px var(--plate-highlight);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; user-select: none; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--base-crust); font-family: 'Inter', sans-serif; color: var(--text-primary); overflow: hidden; display: flex; justify-content: center; align-items: center; }

        .device-frame {
            width: 480px; height: 320px;
            background: var(--plate-surface);
            position: relative;
            display: grid;
            grid-template-columns: 105px 1fr;
            grid-template-rows: 45px 1fr;
            padding: 4px;
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--plate-highlight), 10px 10px 30px rgba(0,0,0,0.5);
        }

        .crt-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%);
            background-size: 100% 2px;
            pointer-events: none; z-index: 100; opacity: 0.1;
        }

        header {
            grid-column: 1 / span 2; display: flex; align-items: center; justify-content: space-between;
            padding: 0 15px; background: var(--base-crust); margin: 4px; border-radius: 4px;
            box-shadow: var(--bevel-inner); font-family: 'JetBrains Mono'; font-size: 13px;
        }

        .brand { display: flex; align-items: center; color: var(--text-dim); }
        .brand img { width: 18px; height: 18px; margin-right: 8px; }
        .dynamic-ip { color: var(--safe-core); font-weight: 900; }

        nav { display: flex; flex-direction: column; gap: 5px; padding: 4px; }
        .nav-item {
            flex: 1; background: var(--plate-surface); border-radius: 6px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: var(--bevel-outer); transition: 0.1s;
        }
        .nav-item.active { box-shadow: var(--bevel-inner); background: var(--base-crust); }
        .nav-item svg { width: 26px; fill: var(--text-dim); margin-bottom: 2px; }
        .nav-item.active svg { fill: var(--accent-core); filter: drop-shadow(0 0 5px var(--accent-glow)); }
        .nav-item span { font-size: 11px; font-weight: 900; color: var(--text-dim); }

        .usb-indicator {
            height: 35px; display: flex; align-items: center; justify-content: center;
            gap: 8px; font-size: 11px; font-family: 'JetBrains Mono'; font-weight: 900; color: var(--text-dim);
            margin-top: 5px; border-top: 1px solid var(--plate-highlight); padding-top: 5px;
        }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent-core); transition: 0.3s; }
        .dot.active { background: var(--safe-core); box-shadow: 0 0 10px var(--safe-core); }

        main { background: var(--base-crust); margin: 4px; border-radius: 6px; box-shadow: var(--bevel-inner); padding: 12px; overflow: hidden; }
        .tab-panel { display: none; height: 100%; flex-direction: column; }
        .tab-panel.active { display: flex; }

        .tectonic-card {
            background: var(--plate-surface); border-radius: 8px; box-shadow: var(--bevel-outer);
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            margin-bottom: 10px; border: 1px solid var(--plate-highlight);
        }

        .status-orb {
            width: 75px; height: 75px; border-radius: 50%; background: var(--base-crust);
            box-shadow: var(--bevel-inner); display: flex; align-items: center; justify-content: center;
            margin-bottom: 8px; transition: 0.3s; cursor: pointer;
        }
        .status-orb.unlocked { border: 3px solid var(--safe-core); box-shadow: var(--bevel-inner), 0 0 15px rgba(0, 255, 162, 0.2); }
        .status-orb.locked { border: 3px solid var(--danger-core); }

        .data-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; width: 100%; }
        .data-cell { background: var(--plate-surface); padding: 12px 5px; border-radius: 6px; box-shadow: var(--bevel-outer); display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .data-cell.action { cursor: pointer; border: 1px solid var(--accent-glow); }
        .data-label { font-size: 8px; color: var(--text-dim); text-transform: uppercase; font-weight: 900; margin-bottom: 4px; }
        .data-value { font-family: 'JetBrains Mono'; font-size: 13px; color: var(--accent-core); font-weight: 700; }

        .terminal { flex: 1; background: #050505; border-radius: 4px; padding: 10px; font-family: 'JetBrains Mono'; font-size: 11px; color: #888; overflow-y: auto; box-shadow: inset 0 2px 10px #000; }
        .input-wrap { display: grid; grid-template-columns: 85px 1fr 70px; gap: 6px; margin-top: 10px; height: 45px; }
        
        input {
            background: var(--base-crust); border: none; box-shadow: var(--bevel-inner);
            border-radius: 4px; padding: 0 10px; color: var(--text-primary);
            font-family: 'JetBrains Mono'; font-size: 13px; outline: none;
            height: 100%; width: 100%;
            pointer-events: auto !important;
        }

        select {
            background: var(--plate-surface); box-shadow: var(--bevel-outer); border: none;
            border-radius: 4px; color: var(--text-primary); font-weight: 900;
            font-size: 13px; cursor: pointer; padding: 0 5px; width: 100%; height: 100%;
            font-family: 'JetBrains Mono'; outline: none; appearance: none; -webkit-appearance: none;
            text-align: center;
        }
        select:active { box-shadow: var(--bevel-inner); transform: translateY(1px); }
        
        .btn-action {
            background: var(--plate-surface); box-shadow: var(--bevel-outer); border: none;
            border-radius: 4px; color: var(--text-primary); font-weight: 900;
            font-size: 13px; cursor: pointer; padding: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-action:active { box-shadow: var(--bevel-inner); transform: translateY(1px); }
    </style>
</head>
<body>

    <div class="device-frame">
        <div class="crt-overlay"></div>
        
        <header>
            <div class="brand">
                <img src="/dumps/pi.webp" alt="Pi">
                <span>lockboxpi.local</span>
            </div>
            <div id="clock">00:00:00</div>
            <div class="dynamic-ip" id="header-ip">0.0.0.0</div>
        </header>

        <nav>
            <div class="nav-item active" onclick="switchTab('adb', this)">
                <svg viewBox="0 0 24 24"><path d="M7 17h10v-2h-1v-3c0-2.21-1.79-4-4-4s-4 1.79-4 4v3H7v2zm5-11c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2z"/></svg>
                <span>ADB</span>
            </div>
            <div class="nav-item" onclick="switchTab('mtk', this)">
                <svg viewBox="0 0 24 24"><path d="M13 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V9l-7-7z"/></svg>
                <span>MTK</span>
            </div>
            <div class="nav-item" onclick="switchTab('knife', this)">
                <svg viewBox="0 0 24 24"><path d="M21 16.5c0 .38-.21.71-.53.88l-7.9 4.44c-.16.09-.36.14-.57.14s-.41-.05-.57-.14l-7.9-4.44c-.31-.17-.53-.5-.53-.88V7.5c0-.38.21-.71.53-.88l7.9-4.44c.16-.09.36-.14.57-.14s.41.05.57.14l7.9 4.44c.31.17.53.5.53.88v9z"/></svg>
                <span>KNIFE</span>
            </div>
            <div class="nav-item" onclick="switchTab('term', this)">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.11 0-2 .89-2 2v12c0 1.1.89 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.11-.89-2-2-2z"/></svg>
                <span>TERM</span>
            </div>
            
            <div class="usb-indicator">
                <div id="usbDot" class="dot"></div>
                USB
            </div>
        </nav>

        <main>
            <div id="adb" class="tab-panel active">
                <div class="tectonic-card" onclick="configureWiFi()">
                    <div id="lockOrb" class="status-orb locked">
                        <svg width="36" height="36" viewBox="0 0 24 24" id="lockIcon">
                            <path id="lockPath" fill="#ff4444" d="M18 8h-1V6c0-2.76-2.24-5-5-5S7 3.24 7 6v2H6c-1.1 0-2 .9-2 2v10c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V10c0-1.1-.9-2-2-2zm-6 9c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm3.1-9H8.9V6c0-1.71 1.39-3.1 3.1-3.1 1.71 0 3.1 1.39 3.1 3.1v2z"/>
                        </svg>
                    </div>
                    <div class="lock-label" id="lockStatus" style="color:var(--danger-core); font-size:13px; font-weight:900; letter-spacing: 1.5px;">WIFI CONFIG</div>
                </div>

                <div class="data-grid">
                    <div class="data-cell action" onclick="window.location.href='/dumps/'">
                        <div class="data-label" style="color:var(--accent-core)">FILES</div>
                        <div class="data-value">EXP</div>
                    </div>
                    <div class="data-cell">
                        <div class="data-label">TEMP</div>
                        <div class="data-value" id="val-temp">--.-°C</div>
                    </div>
                    <div class="data-cell">
                        <div class="data-label">FREE</div>
                        <div class="data-value" id="val-storage">--GB</div>
                    </div>
                    <div class="data-cell">
                        <div class="data-label">UPTIME</div>
                        <div class="data-value" id="val-uptime">--h --m</div>
                    </div>
                </div>
            </div>

            <div id="mtk" class="tab-panel">
                <div class="tectonic-card">
                    <div class="data-label" style="font-size:11px">MTK ENGINE</div>
                    <div id="mtkStatus" class="data-value" style="margin:20px 0; font-size:18px;">DISCONNECTED</div>
                    <button class="btn-action" style="height:50px; width:80%" onclick="runMtk('printgpt')">READ GPT TABLE</button>
                </div>
            </div>

            <div id="knife" class="tab-panel">
                <div class="tectonic-card">
                    <div class="data-label" style="font-size:11px">FORENSIC MODULES</div>
                    <div id="lkStatus" class="data-value" style="margin:20px 0; font-size:18px;">READY</div>
                    <div style="display:flex; gap:15px;">
                        <button class="btn-action" style="height:50px; padding:0 20px" onclick="runLk('pull-pattern')">PULL KEY</button>
                        <button class="btn-action" style="height:50px; padding:0 20px" onclick="runLk('dump-system')">DUMP SYS</button>
                    </div>
                </div>
            </div>

            <div id="term" class="tab-panel">
                <div class="terminal" id="termOutput"></div>
                <div class="input-wrap">
                    <select id="cmdSelect" onchange="injectCmd()">
                        <option value="">MACRO</option>
                        <option value="lsusb">LSUSB</option>
                        <option value="whoami">WHOAMI</option>
                        <option value="uname -a">UNAME</option>
                        <option value="adb devices">ADB_DEV</option>
                        <option value="adb reboot bootloader">BOOT_LDR</option>
                        <option value="adb shell getprop ro.product.model">ADB_MODEL</option>
                        <option value="fastboot devices">FB_DEV</option>
                        <option value="fastboot getvar all">FB_VARS</option>
                        <option value="mtk printgpt">MTK_GPT</option>
                        <option value="mtk e frp">MTK_FRP</option>
                        <option value="knife pull-pattern">KNIFE_KEY</option>
                        <option value="knife dump-system">KNIFE_DUMP</option>
                        <option value="ip addr">IP_ADDR</option>
                        <option value="df -h">DISK_FREE</option>
                        <option value="dmesg | tail -n 20">SYS_LOG</option>
                        <option value="DISPLAY=:0 xinput set-prop 'ADS7846 Touchscreen' 'Coordinate Transformation Matrix' 0 1 0 -1 0 1 0 0 1">TOUCH_ROTATE</option>
                        <option value="DISPLAY=:0 xinput set-prop 'ADS7846 Touchscreen' 'Coordinate Transformation Matrix' 1.1 0 -0.05 0 1.1 -0.05 0 0 1">TOUCH_CALIB</option>
                        <option value="sudo systemctl restart lockbox-bridge.service">RE_BRIDGE</option>
                        <option value="sudo reboot">REBOOT</option>
                    </select>
                    <input type="text" id="termInput" placeholder="CMD..." ontouchstart="this.focus();">
                    <button class="btn-action" onclick="pushCmd()">CMD</button>
                </div>
            </div>
        </main>
    </div>

    <script>
        const host = window.location.hostname || "127.0.0.1";
        const bridgeUrl = `http://${host}:5000`;

        function updateClock() {
            document.getElementById('clock').textContent = new Date().toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);
        updateClock();

        function switchTab(tabId, el) {
            document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            if(el) el.classList.add('active');
        }

        // WiFi Configuration Triggered by Lock Icon
        function configureWiFi() {
            const ssid = prompt("WIFI SSID:");
            if (!ssid) return;
            const psk = prompt(`PASSWORD FOR ${ssid}:`);
            if (!psk) return;
            const slot = prompt("SLOT (3 OR 4)?", "3");
            if (slot !== "3" && slot !== "4") {
                alert("INVALID SLOT");
                return;
            }

            logToTerm(`Configuring WiFi Slot ${slot}...`, "sys");
            
            fetch(`${bridgeUrl}/wifi/connect`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ssid, psk, slot: parseInt(slot) })
            })
            .then(res => res.json())
            .then(data => {
                logToTerm(data.output, "sys");
            })
            .catch(() => logToTerm("CONFIG FAILED", "sys"));
        }

        function logToTerm(text, type = 'cmd') {
            const out = document.getElementById('termOutput');
            const ln = document.createElement('div');
            ln.style.color = type === 'sys' ? '#666' : 'var(--accent-core)';
            ln.style.marginBottom = '3px';
            ln.textContent = `> ${text}`;
            out.appendChild(ln);
            out.scrollTop = out.scrollHeight;
        }

        function injectCmd() {
            const sel = document.getElementById('cmdSelect');
            if(sel.value) {
                document.getElementById('termInput').value = sel.value;
                sel.selectedIndex = 0;
            }
        }

        function pushCmd() {
            const input = document.getElementById('termInput');
            const cmd = input.value.trim();
            if (!cmd) return;
            logToTerm(cmd);
            input.value = '';
            fetch(`${bridgeUrl}/terminal/run`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ command: cmd })
            }).then(res => res.json()).then(data => {
                if(data.output) data.output.split('\n').forEach(line => { if(line.trim()) logToTerm(line, 'sys'); });
            }).catch(() => logToTerm("BRIDGE OFFLINE", "sys"));
        }

        function updateDashboard() {
            fetch(`${bridgeUrl}/stats`).then(res => res.json()).then(data => {
                const ipEl = document.getElementById('header-ip');
                ipEl.textContent = data.ip_address;
                
                document.getElementById('val-temp').textContent = data.cpu_temp;
                document.getElementById('val-storage').textContent = data.storage_free;
                document.getElementById('val-uptime').textContent = data.uptime;
                
                const dot = document.getElementById('usbDot');
                if (data.usb_active) {
                    dot.classList.add('active');
                } else {
                    dot.classList.remove('active');
                }
            }).catch(err => console.error("Stats check offline", err))
            .finally(() => {
                setTimeout(updateDashboard, 4000);
            });
        }
        updateDashboard();

        function runMtk(cmd) {
            switchTab('term', document.querySelectorAll('.nav-item')[3]);
            logToTerm(`MTK: ${cmd}...`);
            fetch(`${bridgeUrl}/mtk/${cmd}`).then(res => res.json()).then(data => {
                if(data.output) data.output.split('\n').forEach(line => logToTerm(line, 'sys'));
            });
        }

        function runLk(cmd) {
            switchTab('term', document.querySelectorAll('.nav-item')[3]);
            logToTerm(`Knife: ${cmd}...`);
            fetch(`${bridgeUrl}/lk/${cmd}`).then(res => res.json()).then(data => {
                if(data.output) data.output.split('\n').forEach(line => logToTerm(line, 'sys'));
            });
        }
    </script>
</body>
</html>
