<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Background Gradients -->
        <linearGradient id="board-bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0B1C14"/>
            <stop offset="50%" stop-color="#06120A"/>
            <stop offset="100%" stop-color="#030805"/>
        </linearGradient>
        
        <!-- Metal Gradients -->
        <linearGradient id="silver-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E2E8F0"/>
            <stop offset="50%" stop-color="#A0AEC0"/>
            <stop offset="100%" stop-color="#4A5568"/>
        </linearGradient>
        <linearGradient id="face-base" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#718096"/>
            <stop offset="100%" stop-color="#2D3748"/>
        </linearGradient>
        <linearGradient id="plate-light" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#A0AEC0"/>
            <stop offset="100%" stop-color="#4A5568"/>
        </linearGradient>
        <linearGradient id="plate-dark" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#4A5568"/>
            <stop offset="100%" stop-color="#1A202C"/>
        </linearGradient>
        
        <!-- Hoodie Gradients -->
        <linearGradient id="hoodie-left" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1A1E26"/>
            <stop offset="50%" stop-color="#11141A"/>
            <stop offset="100%" stop-color="#050608"/>
        </linearGradient>
        <linearGradient id="hoodie-right" x1="100%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#222733"/>
            <stop offset="50%" stop-color="#11141A"/>
            <stop offset="100%" stop-color="#050608"/>
        </linearGradient>
        <linearGradient id="chest-grad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#2D3748"/>
            <stop offset="100%" stop-color="#0D1117"/>
        </linearGradient>

        <!-- Glow Filters -->
        <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        <filter id="glow-red" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feMerge>
                <feMergeNode in="blur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
        
        <!-- Drop Shadow for Bot -->
        <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feDropShadow dx="0" dy="15" stdDeviation="15" flood-color="#000000" flood-opacity="0.9"/>
        </filter>

        <!-- Patterns -->
        <pattern id="gpio-pins" width="10" height="24" patternUnits="userSpaceOnUse">
            <circle cx="5" cy="6" r="2.5" fill="#FFD700"/>
            <circle cx="5" cy="18" r="2.5" fill="#FFD700"/>
        </pattern>
        <pattern id="ribbon" width="15" height="4" patternUnits="userSpaceOnUse">
            <line x1="0" y1="2" x2="15" y2="2" stroke="#1A202C" stroke-width="1"/>
        </pattern>
        <pattern id="carbon" width="8" height="8" patternUnits="userSpaceOnUse">
            <path d="M0,0 L8,8 M8,0 L0,8" stroke="#ffffff" stroke-width="0.5" opacity="0.03"/>
        </pattern>
    </defs>

    <!-- ================= BACKGROUND: RASPBERRY PI MOTHERBOARD ================= -->
    <rect width="512" height="512" rx="90" fill="url(#board-bg)"/>
    <rect x="12" y="12" width="488" height="488" rx="80" fill="none" stroke="#1A3B2A" stroke-width="6"/>
    
    <!-- Motherboard Background Rings -->
    <circle cx="256" cy="256" r="220" fill="none" stroke="#1A3B2A" stroke-width="2" opacity="0.4"/>
    <circle cx="256" cy="256" r="160" fill="none" stroke="#1A3B2A" stroke-width="4" opacity="0.3"/>
    <circle cx="256" cy="256" r="100" fill="none" stroke="#1A3B2A" stroke-width="1" opacity="0.5"/>

    <!-- Mounting Holes -->
    <g stroke="#D4AF37" stroke-width="5">
        <circle cx="56" cy="56" r="14" fill="#050907"/>
        <circle cx="456" cy="56" r="14" fill="#050907"/>
        <circle cx="56" cy="456" r="14" fill="#050907"/>
        <circle cx="456" cy="456" r="14" fill="#050907"/>
    </g>

    <!-- Circuit Traces & Solder Points -->
    <g stroke="#39FF14" stroke-width="2" fill="none" opacity="0.6">
        <!-- Top Left -->
        <path d="M 80 56 L 130 56 L 160 86 L 160 120"/>
        <circle cx="160" cy="120" r="3" fill="#39FF14"/>
        <path d="M 56 80 L 56 130 L 86 160 L 120 160"/>
        <circle cx="120" cy="160" r="3" fill="#39FF14"/>
        <!-- Top Right -->
        <path d="M 432 56 L 382 56 L 352 86 L 352 120"/>
        <circle cx="352" cy="120" r="3" fill="#39FF14"/>
        <path d="M 456 80 L 456 130 L 426 160 L 380 160"/>
        <circle cx="380" cy="160" r="3" fill="#39FF14"/>
        <!-- Bottom Left -->
        <path d="M 80 456 L 130 456 L 160 426 L 160 380"/>
        <circle cx="160" cy="380" r="3" fill="#39FF14"/>
        <!-- Bottom Right -->
        <path d="M 432 456 L 382 456 L 352 426 L 352 380"/>
        <circle cx="352" cy="380" r="3" fill="#39FF14"/>
    </g>

    <!-- GPIO Pins (Top Edge) -->
    <rect x="156" y="15" width="200" height="24" rx="3" fill="#0A0D14" stroke="#1A202C" stroke-width="2"/>
    <rect x="160" y="15" width="190" height="24" fill="url(#gpio-pins)"/>

    <!-- USB & Ethernet Ports (Left Edge) -->
    <g stroke="#1A202C" stroke-width="2">
        <!-- Ethernet -->
        <rect x="10" y="140" width="40" height="60" rx="4" fill="url(#silver-grad)"/>
        <rect x="20" y="150" width="30" height="40" rx="2" fill="#050608"/>
        <line x1="25" y1="155" x2="45" y2="155" stroke="#D4AF37" stroke-width="2"/>
        <!-- USB 1 -->
        <rect x="10" y="220" width="40" height="50" rx="4" fill="url(#silver-grad)"/>
        <rect x="20" y="230" width="30" height="10" fill="#050608"/>
        <rect x="20" y="250" width="30" height="10" fill="#050608"/>
        <!-- USB 2 -->
        <rect x="10" y="290" width="40" height="50" rx="4" fill="url(#silver-grad)"/>
        <rect x="20" y="300" width="30" height="10" fill="#050608"/>
        <rect x="20" y="320" width="30" height="10" fill="#050608"/>
    </g>

    <!-- Camera Ribbon Connector -->
    <rect x="80" y="210" width="15" height="80" rx="2" fill="#0A0D14"/>
    <rect x="82" y="212" width="11" height="76" fill="#E2E8F0"/>
    <rect x="82" y="212" width="11" height="76" fill="url(#ribbon)"/>

    <!-- Broadcom CPU Chip -->
    <rect x="206" y="70" width="100" height="100" rx="5" fill="#1A1C23" stroke="#2D3139" stroke-width="2"/>
    <rect x="216" y="80" width="80" height="80" rx="2" fill="#2D3139"/>
    <circle cx="256" cy="120" r="15" fill="none" stroke="#5C667A" stroke-width="2"/>
    <path d="M 256 105 L 256 135 M 241 120 L 271 120" stroke="#5C667A" stroke-width="2"/>

    <!-- Background Data Streams (Matrix-style) -->
    <g fill="#39FF14" opacity="0.25">
        <rect x="100" y="80" width="4" height="20" rx="2"/>
        <rect x="100" y="110" width="4" height="8" rx="2"/>
        <rect x="100" y="125" width="4" height="30" rx="2"/>
        
        <rect x="410" y="150" width="4" height="25" rx="2"/>
        <rect x="410" y="185" width="4" height="10" rx="2"/>
        <rect x="410" y="205" width="4" height="15" rx="2"/>

        <rect x="380" y="280" width="4" height="15" rx="2"/>
        <rect x="380" y="305" width="4" height="25" rx="2"/>
    </g>

    <!-- Cyber Halo -->
    <circle cx="256" cy="200" r="120" fill="none" stroke="#00FFFF" stroke-width="1.5" stroke-dasharray="4 8" opacity="0.6" filter="url(#glow-cyan)"/>
    <circle cx="256" cy="200" r="135" fill="none" stroke="#39FF14" stroke-width="2" stroke-dasharray="20 10 5 10" opacity="0.5" filter="url(#glow-green)"/>

    <!-- ================= FOREGROUND: MALE AI BOT ================= -->
    <g filter="url(#drop-shadow)">
        
        <!-- Hoodie Inner Back -->
        <path d="M 160 280 C 160 120, 220 80, 256 80 C 292 80, 352 120, 352 280 L 352 360 L 160 360 Z" fill="#030406"/>

        <!-- Neck & Cables -->
        <rect x="226" y="260" width="60" height="50" fill="#1A202C"/>
        <!-- Neck Ridges -->
        <rect x="230" y="265" width="52" height="6" fill="#0D1117"/>
        <rect x="230" y="275" width="52" height="6" fill="#0D1117"/>
        <rect x="230" y="285" width="52" height="6" fill="#0D1117"/>
        <rect x="230" y="295" width="52" height="6" fill="#0D1117"/>
        <!-- Glowing Neck Wires -->
        <line x1="240" y1="260" x2="240" y2="310" stroke="#00FFFF" stroke-width="3" filter="url(#glow-cyan)"/>
        <line x1="272" y1="260" x2="272" y2="310" stroke="#00FFFF" stroke-width="3" filter="url(#glow-cyan)"/>

        <!-- Chest Plate / Cyber Armor -->
        <path d="M 180 300 L 332 300 L 292 400 L 220 400 Z" fill="url(#chest-grad)"/>
        <polygon points="256,290 320,320 290,400 256,420 222,400 192,320" fill="url(#chest-grad)"/>
        <polygon points="256,290 320,320 256,340 192,320" fill="#4A5568" opacity="0.3"/>
        
        <!-- Raspberry Pi Chest Shield -->
        <polygon points="256,330 300,350 280,420 256,440 232,420 212,350" fill="#050608" stroke="#39FF14" stroke-width="2" filter="url(#glow-green)"/>
        
        <!-- Glowing Raspberry Pi Logo -->
        <g transform="translate(256, 380) scale(1.5)">
            <!-- Leaves -->
            <path d="M -9 -5 C -13 -13, -5 -17, 0 -9 C 5 -17, 13 -13, 9 -5 C 5 -1, -5 -1, -9 -5 Z" fill="#39FF14" filter="url(#glow-green)"/>
            <!-- Berry -->
            <circle cx="-5" cy="1" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="5" cy="1" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="-7" cy="8" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="0" cy="8" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="7" cy="8" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="-4" cy="15" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="4" cy="15" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
            <circle cx="0" cy="22" r="3.5" fill="#FF0055" filter="url(#glow-red)"/>
        </g>

        <!-- ================= MALE AI HEAD ================= -->
        <g id="ai-head">
            <!-- Base Cranium / Face -->
            <path d="M 196 180 L 196 240 L 226 280 L 286 280 L 316 240 L 316 180 C 316 130, 196 130, 196 180 Z" fill="url(#face-base)"/>
            
            <!-- Jaw / Cheek Plates (Masculine Angularity) -->
            <path d="M 196 210 L 226 240 L 226 280 L 196 240 Z" fill="url(#plate-dark)"/>
            <path d="M 316 210 L 286 240 L 286 280 L 316 240 Z" fill="url(#plate-light)"/>
            
            <!-- Chin Plate -->
            <polygon points="236,250 276,250 266,280 246,280" fill="#718096"/>
            
            <!-- Cybernetic Jaw Lines -->
            <path d="M 196 240 L 226 280 L 286 280 L 316 240" fill="none" stroke="#1A202C" stroke-width="3"/>
            <line x1="226" y1="280" x2="226" y2="240" stroke="#1A202C" stroke-width="2"/>
            <line x1="286" y1="280" x2="286" y2="240" stroke="#1A202C" stroke-width="2"/>

            <!-- Mouth / Speaker Grill -->
            <line x1="244" y1="260" x2="268" y2="260" stroke="#00FFFF" stroke-width="2" filter="url(#glow-cyan)"/>
            <line x1="246" y1="266" x2="266" y2="266" stroke="#00FFFF" stroke-width="2" filter="url(#glow-cyan)"/>
            <line x1="248" y1="272" x2="264" y2="272" stroke="#00FFFF" stroke-width="2" filter="url(#glow-cyan)"/>

            <!-- Nose Bridge -->
            <polygon points="250,180 262,180 266,230 246,230" fill="url(#plate-dark)"/>

            <!-- Forehead Plate -->
            <path d="M 216 140 L 296 140 L 286 170 L 226 170 Z" fill="url(#plate-light)"/>
            <path d="M 216 140 L 296 140 L 256 120 Z" fill="#A0AEC0"/>

            <!-- Neural Core (Forehead) -->
            <polygon points="256,130 266,150 256,170 246,150" fill="#39FF14" filter="url(#glow-green)"/>
            <polygon points="256,140 260,150 256,160 252,150" fill="#FFFFFF"/>
            <!-- Neural Traces -->
            <path d="M 256 130 L 256 110 M 246 150 L 216 150 M 266 150 L 296 150" stroke="#39FF14" stroke-width="2" filter="url(#glow-green)"/>

            <!-- Eye Sockets (Aggressive Angle) -->
            <polygon points="196,185 246,195 242,205 192,195" fill="#000000"/>
            <polygon points="316,185 266,195 270,205 320,195" fill="#000000"/>

            <!-- Glowing Cyber Eyes -->
            <polygon points="206,190 240,197 238,201 204,194" fill="#00FFFF" filter="url(#glow-cyan)"/>
            <polygon points="306,190 272,197 274,201 308,194" fill="#00FFFF" filter="url(#glow-cyan)"/>
            <!-- Eye Cores (Brightest part) -->
            <circle cx="226" cy="196" r="2" fill="#FFFFFF"/>
            <circle cx="286" cy="196" r="2" fill="#FFFFFF"/>

            <!-- Cheek Data Lines -->
            <path d="M 206 225 L 220 225 L 226 235" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#glow-cyan)"/>
            <path d="M 306 225 L 292 225 L 286 235" fill="none" stroke="#00FFFF" stroke-width="2" filter="url(#glow-cyan)"/>
        </g>

        <!-- ================= HACKER HOODIE (OUTER) ================= -->
        <!-- Left Side Hoodie -->
        <path d="M 256 40 C 180 40, 60 100, 40 300 L 20 512 L 256 512 L 256 400 C 220 380, 160 300, 160 280 C 160 120, 220 80, 256 80 Z" fill="url(#hoodie-left)"/>
        <!-- Right Side Hoodie -->
        <path d="M 256 40 C 332 40, 452 100, 472 300 L 492 512 L 256 512 L 256 400 C 292 380, 352 300, 352 280 C 352 120, 292 80, 256 80 Z" fill="url(#hoodie-right)"/>
        
        <!-- Carbon Fiber Texture Overlay on Hoodie -->
        <path d="M 256 40 C 180 40, 60 100, 40 300 L 20 512 L 492 512 L 472 300 C 452 100, 332 40, 256 40 Z" fill="url(#carbon)" pointer-events="none"/>

        <!-- Hoodie Inner Glowing Trim -->
        <path d="M 160 280 C 160 120, 220 80, 256 80 C 292 80, 352 120, 352 280 C 352 300, 292 380, 256 400 C 220 380, 160 300, 160 280 Z" fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow-green)"/>

        <!-- Hoodie Tech Lines / Seams -->
        <path d="M 120 350 L 180 350 L 200 380 L 200 512" fill="none" stroke="#39FF14" stroke-width="2" opacity="0.4"/>
        <path d="M 392 350 L 332 350 L 312 380 L 312 512" fill="none" stroke="#39FF14" stroke-width="2" opacity="0.4"/>
        
        <path d="M 80 420 L 140 420 L 160 450" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.3"/>
        <path d="M 432 420 L 372 420 L 352 450" fill="none" stroke="#00FFFF" stroke-width="1.5" opacity="0.3"/>

        <!-- Shoulder Armor Plates on Hoodie -->
        <polygon points="40,300 100,280 140,340 80,360" fill="#1A202C" opacity="0.8" stroke="#39FF14" stroke-width="1"/>
        <polygon points="472,300 412,280 372,340 432,360" fill="#1A202C" opacity="0.8" stroke="#39FF14" stroke-width="1"/>

    </g>

    <!-- Foreground Floating Holographic Data Rings -->
    <circle cx="256" cy="400" r="180" fill="none" stroke="#00FFFF" stroke-width="1" stroke-dasharray="2 6" opacity="0.3" transform="scale(1, 0.3) translate(0, 1000)"/>
    <circle cx="256" cy="400" r="220" fill="none" stroke="#39FF14" stroke-width="2" stroke-dasharray="10 20" opacity="0.2" transform="scale(1, 0.3) translate(0, 1000)"/>

</svg>