<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
    <defs>
        <!-- Filters -->
        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="4" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
            <feDropShadow dx="8" dy="12" stdDeviation="10" flood-color="#000" flood-opacity="0.7"/>
        </filter>
        
        <!-- Gradients -->
        <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
            <stop offset="0%" stop-color="#162436"/>
            <stop offset="60%" stop-color="#0a1118"/>
            <stop offset="100%" stop-color="#020406"/>
        </radialGradient>

        <linearGradient id="poleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3a3a3a"/>
            <stop offset="20%" stop-color="#7a7a7a"/>
            <stop offset="50%" stop-color="#1a1a1a"/>
            <stop offset="80%" stop-color="#4a4a4a"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
        </linearGradient>
        
        <linearGradient id="flagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#2a2a32"/>
            <stop offset="40%" stop-color="#15151a"/>
            <stop offset="100%" stop-color="#050508"/>
        </linearGradient>

        <linearGradient id="rippleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
            <stop offset="30%" stop-color="#ffffff" stop-opacity="0.03"/>
            <stop offset="50%" stop-color="#000000" stop-opacity="0.6"/>
            <stop offset="70%" stop-color="#ffffff" stop-opacity="0.12"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </linearGradient>

        <linearGradient id="berryGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#e91e63"/>
            <stop offset="50%" stop-color="#c2185b"/>
            <stop offset="100%" stop-color="#880e4f"/>
        </linearGradient>

        <linearGradient id="leafGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#8bc34a"/>
            <stop offset="100%" stop-color="#33691e"/>
        </linearGradient>
        
        <linearGradient id="pcbGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#00695c"/>
            <stop offset="100%" stop-color="#003d33"/>
        </linearGradient>

        <!-- Patterns -->
        <pattern id="techGrid" width="24" height="24" patternUnits="userSpaceOnUse">
            <path d="M 24 0 L 0 0 L 0 24" fill="none" stroke="#4db6ac" stroke-width="0.5" opacity="0.15"/>
            <circle cx="24" cy="24" r="1" fill="#4db6ac" opacity="0.3"/>
        </pattern>

        <!-- Reusable Components -->
        <g id="pcb-bone">
            <!-- Main Board -->
            <rect x="-90" y="-14" width="180" height="28" rx="3" fill="url(#pcbGrad)" stroke="#004d40" stroke-width="2"/>
            <!-- Microchips -->
            <rect x="-65" y="-8" width="16" height="16" fill="#111" rx="2"/>
            <circle cx="-61" cy="-4" r="1.5" fill="#333"/>
            <rect x="49" y="-8" width="16" height="16" fill="#111" rx="2"/>
            <circle cx="53" cy="-4" r="1.5" fill="#333"/>
            <!-- Gold Contacts Left -->
            <path d="M -85 -14 L -85 -7 M -80 -14 L -80 -7 M -75 -14 L -75 -7" stroke="#ffca28" stroke-width="2"/>
            <path d="M -85 14 L -85 7 M -80 14 L -80 7 M -75 14 L -75 7" stroke="#ffca28" stroke-width="2"/>
            <!-- Gold Contacts Right -->
            <path d="M 85 -14 L 85 -7 M 80 -14 L 80 -7 M 75 -14 L 75 -7" stroke="#ffca28" stroke-width="2"/>
            <path d="M 85 14 L 85 7 M 80 14 L 80 7 M 75 14 L 75 7" stroke="#ffca28" stroke-width="2"/>
            <!-- Traces -->
            <path d="M -40 0 L -25 0 L -15 8 L 15 8 L 25 0 L 40 0" fill="none" stroke="#4db6ac" stroke-width="1.5" opacity="0.8"/>
            <circle cx="-40" cy="0" r="2" fill="#4db6ac"/>
            <circle cx="40" cy="0" r="2" fill="#4db6ac"/>
            <path d="M -30 -6 L -15 -6 L -5 -2 L 5 -2 L 15 -6 L 30 -6" fill="none" stroke="#4db6ac" stroke-width="1" opacity="0.8"/>
        </g>

        <g id="pi-skull">
            <!-- Base Berry Shape -->
            <!-- Left lobes -->
            <circle cx="-35" cy="-20" r="22" fill="url(#berryGrad)"/>
            <circle cx="-40" cy="15" r="24" fill="url(#berryGrad)"/>
            <circle cx="-30" cy="50" r="20" fill="url(#berryGrad)"/>
            <!-- Right lobes -->
            <circle cx="35" cy="-20" r="22" fill="url(#berryGrad)"/>
            <circle cx="40" cy="15" r="24" fill="url(#berryGrad)"/>
            <circle cx="30" cy="50" r="20" fill="url(#berryGrad)"/>
            <!-- Center fill -->
            <path d="M -35 -20 L 35 -20 L 40 15 L 30 50 L -30 50 L -40 15 Z" fill="url(#berryGrad)"/>
            
            <!-- Berry Highlights -->
            <path d="M -45 -30 A 15 15 0 0 1 -25 -35" fill="none" stroke="#ff8a80" stroke-width="2" opacity="0.4"/>
            <path d="M -55 5 A 15 15 0 0 1 -35 -5" fill="none" stroke="#ff8a80" stroke-width="2" opacity="0.4"/>
            <path d="M -40 40 A 15 15 0 0 1 -20 35" fill="none" stroke="#ff8a80" stroke-width="2" opacity="0.4"/>
            <path d="M 25 -35 A 15 15 0 0 1 45 -30" fill="none" stroke="#ff8a80" stroke-width="2" opacity="0.4"/>
            <path d="M 35 -5 A 15 15 0 0 1 55 5" fill="none" stroke="#ff8a80" stroke-width="2" opacity="0.4"/>
            <path d="M 20 35 A 15 15 0 0 1 40 40" fill="none" stroke="#ff8a80" stroke-width="2" opacity="0.4"/>

            <!-- Leaves (Top Crown) -->
            <g id="leaves">
                <path d="M 0 -35 Q -15 -70 0 -80 Q 15 -70 0 -35" fill="url(#leafGrad)"/>
                <path d="M -15 -30 Q -40 -50 -45 -70 Q -20 -60 -15 -30" fill="url(#leafGrad)"/>
                <path d="M 15 -30 Q 40 -50 45 -70 Q 20 -60 15 -30" fill="url(#leafGrad)"/>
                <path d="M -25 -20 Q -60 -20 -70 -35 Q -45 -35 -25 -20" fill="url(#leafGrad)"/>
                <path d="M 25 -20 Q 60 -20 70 -35 Q 45 -35 25 -20" fill="url(#leafGrad)"/>
                <!-- Leaf Highlights -->
                <path d="M 0 -35 Q -5 -60 0 -75" fill="none" stroke="#c5e1a5" stroke-width="1.5" opacity="0.6"/>
                <path d="M -15 -30 Q -25 -50 -40 -65" fill="none" stroke="#c5e1a5" stroke-width="1.5" opacity="0.6"/>
                <path d="M 15 -30 Q 25 -50 40 -65" fill="none" stroke="#c5e1a5" stroke-width="1.5" opacity="0.6"/>
            </g>

            <!-- Circuit Traces on Skull -->
            <path d="M 40 -10 L 50 -10 L 55 -5" fill="none" stroke="#ffca28" stroke-width="1.5" opacity="0.5"/>
            <circle cx="55" cy="-5" r="1.5" fill="#ffca28" opacity="0.5"/>
            <path d="M -40 40 L -50 40 L -55 35" fill="none" stroke="#ffca28" stroke-width="1.5" opacity="0.5"/>
            <circle cx="-55" cy="35" r="1.5" fill="#ffca28" opacity="0.5"/>
            <path d="M 35 45 L 45 55 L 45 65" fill="none" stroke="#ffca28" stroke-width="1.5" opacity="0.5"/>
            <circle cx="45" cy="65" r="1.5" fill="#ffca28" opacity="0.5"/>

            <!-- Pirate Features -->
            <!-- Eyepatch String -->
            <line x1="-50" y1="-20" x2="40" y2="15" stroke="#0a0a0a" stroke-width="3"/>
            <!-- Eyepatch (Left Eye) -->
            <path d="M -35 -5 C -15 -5, -10 25, -25 30 C -40 25, -45 -5, -35 -5 Z" fill="#0a0a0a"/>
            
            <!-- Cyber Eye (Right Eye) -->
            <circle cx="25" cy="10" r="12" fill="#050505"/>
            <circle cx="25" cy="10" r="6" fill="#ff0000" filter="url(#glow)">
                <animate attributeName="opacity" values="0.3; 1; 0.3" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="25" cy="10" r="2" fill="#ffffff"/>
            <path d="M 25 0 L 25 20 M 15 10 L 35 10" stroke="#ff0000" stroke-width="1" opacity="0.8"/>

            <!-- Nose (USB Slits) -->
            <path d="M -6 30 L 6 30 L 9 42 L -9 42 Z" fill="#0a0a0a"/>

            <!-- Teeth (GPIO Pins) -->
            <rect x="-28" y="55" width="56" height="12" rx="2" fill="#151515" stroke="#000" stroke-width="1"/>
            <g fill="#ffca28">
                <rect x="-24" y="67" width="4" height="14" rx="1"/>
                <rect x="-14" y="67" width="4" height="14" rx="1"/>
                <rect x="-4" y="67" width="4" height="14" rx="1"/>
                <rect x="6" y="67" width="4" height="14" rx="1"/>
                <rect x="16" y="67" width="4" height="14" rx="1"/>
                <rect x="26" y="67" width="4" height="14" rx="1"/>
            </g>
        </g>

        <!-- Animated Flag Path Definition -->
        <path id="animatedFlag">
            <animate attributeName="d" 
                values="M 80 60 C 180 20, 300 110, 480 50 L 440 110 L 490 170 L 430 230 L 480 290 L 420 350 C 300 410, 180 320, 80 360 Z;
                        M 80 60 C 200 80, 280 40, 460 70 L 420 130 L 470 190 L 410 250 L 460 310 L 400 370 C 280 390, 200 360, 80 360 Z;
                        M 80 60 C 160 100, 320 20, 490 40 L 450 100 L 500 160 L 440 220 L 490 280 L 430 340 C 320 380, 160 390, 80 360 Z;
                        M 80 60 C 180 20, 300 110, 480 50 L 440 110 L 490 170 L 430 230 L 480 290 L 420 350 C 300 410, 180 320, 80 360 Z" 
                dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
        </path>

        <clipPath id="flagClip">
            <path>
                <animate attributeName="d" 
                    values="M 80 60 C 180 20, 300 110, 480 50 L 440 110 L 490 170 L 430 230 L 480 290 L 420 350 C 300 410, 180 320, 80 360 Z;
                            M 80 60 C 200 80, 280 40, 460 70 L 420 130 L 470 190 L 410 250 L 460 310 L 400 370 C 280 390, 200 360, 80 360 Z;
                            M 80 60 C 160 100, 320 20, 490 40 L 450 100 L 500 160 L 440 220 L 490 280 L 430 340 C 320 380, 160 390, 80 360 Z;
                            M 80 60 C 180 20, 300 110, 480 50 L 440 110 L 490 170 L 430 230 L 480 290 L 420 350 C 300 410, 180 320, 80 360 Z" 
                    dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1"/>
            </path>
        </clipPath>

        <!-- Mask for Tattered Holes -->
        <mask id="flagMask">
            <rect x="0" y="0" width="512" height="512" fill="white"/>
            <g transform="translate(270, 210)">
                <g>
                    <animateTransform attributeName="transform" type="translate" values="0,0; -10,15; 10,-5; 0,0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1" />
                    <g>
                        <animateTransform attributeName="transform" type="rotate" values="0; -4; 3; 0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1" />
                        <!-- Tattered Holes -->
                        <circle cx="130" cy="-60" r="8" fill="black"/>
                        <circle cx="140" cy="-65" r="5" fill="black"/>
                        <circle cx="80" cy="110" r="10" fill="black"/>
                        <circle cx="70" cy="120" r="6" fill="black"/>
                        <circle cx="-70" cy="-110" r="4" fill="black"/>
                        <circle cx="-20" cy="130" r="5" fill="black"/>
                        <!-- Edge Notch -->
                        <path d="M 180 -100 L 220 -80 L 170 -60 Z" fill="black"/>
                    </g>
                </g>
            </g>
        </mask>
    </defs>

    <!-- Background -->
    <rect width="512" height="512" fill="url(#bgGrad)"/>
    
    <!-- Ambient Glow -->
    <circle cx="256" cy="256" r="180" fill="#4db6ac" opacity="0.08" filter="url(#glow)"/>

    <!-- Cyber Particles -->
    <g id="particles" opacity="0.6">
        <rect x="120" y="450" width="4" height="4" fill="#4db6ac">
            <animate attributeName="y" values="450; -10" dur="4s" repeatCount="indefinite"/>
            <animate attributeName="opacity" values="0; 1; 0" dur="4s" repeatCount="indefinite"/>
        </rect>
        <rect x="350" y="520" width="6" height="6" fill="#ffca28">
            <animate attributeName="y" values="520; -10" dur="5s" repeatCount="indefinite" begin="1s"/>
            <animate attributeName="opacity" values="0; 1; 0" dur="5s" repeatCount="indefinite" begin="1s"/>
        </rect>
        <rect x="420" y="300" width="3" height="3" fill="#e91e63">
            <animate attributeName="y" values="300; -10" dur="3.5s" repeatCount="indefinite" begin="2s"/>
            <animate attributeName="opacity" values="0; 1; 0" dur="3.5s" repeatCount="indefinite" begin="2s"/>
        </rect>
        <rect x="200" y="480" width="5" height="5" fill="#8bc34a">
            <animate attributeName="y" values="480; -10" dur="6s" repeatCount="indefinite" begin="0.5s"/>
            <animate attributeName="opacity" values="0; 1; 0" dur="6s" repeatCount="indefinite" begin="0.5s"/>
        </rect>
        <rect x="60" y="250" width="4" height="4" fill="#4db6ac">
            <animate attributeName="y" values="250; -10" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
            <animate attributeName="opacity" values="0; 1; 0" dur="4.5s" repeatCount="indefinite" begin="1.5s"/>
        </rect>
    </g>

    <!-- Flag and Emblem Group -->
    <g filter="url(#shadow)">
        
        <!-- Masked Flag (for holes) -->
        <g mask="url(#flagMask)">
            <!-- Base Fabric -->
            <use href="#animatedFlag" fill="url(#flagGrad)"/>
            
            <!-- Tech Grid Overlay -->
            <use href="#animatedFlag" fill="url(#techGrid)"/>
            
            <!-- Wind Ripples -->
            <g clip-path="url(#flagClip)">
                <rect x="-800" y="0" width="1000" height="500" fill="url(#rippleGrad)">
                    <animate attributeName="x" values="-800; 400" dur="3s" repeatCount="indefinite"/>
                </rect>
                <rect x="-500" y="0" width="800" height="500" fill="url(#rippleGrad)">
                    <animate attributeName="x" values="-500; 600" dur="3s" repeatCount="indefinite" begin="1.5s"/>
                </rect>
            </g>
        </g>

        <!-- Jolly Roger Pi Emblem -->
        <g id="emblem" transform="translate(270, 210)">
            <g>
                <animateTransform attributeName="transform" type="translate" values="0,0; -10,15; 10,-5; 0,0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1" />
                <g>
                    <animateTransform attributeName="transform" type="rotate" values="0; -4; 3; 0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1" />
                    <g>
                        <animateTransform attributeName="transform" type="skewY" values="0; 5; -5; 0" dur="3s" repeatCount="indefinite" keyTimes="0; 0.33; 0.66; 1" calcMode="spline" keySplines="0.4 0 0.6 1; 0.4 0 0.6 1; 0.4 0 0.6 1" />
                        
                        <g transform="scale(1.15)">
                            <!-- Crossed PCBs -->
                            <use href="#pcb-bone" transform="rotate(35)"/>
                            <use href="#pcb-bone" transform="rotate(-35)"/>
                            <!-- Raspberry Pi Skull -->
                            <use href="#pi-skull" />
                        </g>
                    </g>
                </g>
            </g>
        </g>
    </g>

    <!-- Flagpole Group -->
    <g id="pole">
        <!-- Base Stand -->
        <ellipse cx="78" cy="490" rx="35" ry="10" fill="url(#poleGrad)" filter="url(#shadow)"/>
        <ellipse cx="78" cy="485" rx="25" ry="6" fill="#1a1a1a"/>
        
        <!-- Main Mast -->
        <rect x="70" y="30" width="16" height="460" fill="url(#poleGrad)" rx="8" filter="url(#shadow)"/>
        
        <!-- Mast Details (Segments) -->
        <line x1="70" y1="100" x2="86" y2="100" stroke="#0a0a0a" stroke-width="2"/>
        <line x1="70" y1="200" x2="86" y2="200" stroke="#0a0a0a" stroke-width="2"/>
        <line x1="70" y1="300" x2="86" y2="300" stroke="#0a0a0a" stroke-width="2"/>
        <line x1="70" y1="400" x2="86" y2="400" stroke="#0a0a0a" stroke-width="2"/>
        
        <!-- Mast Highlight -->
        <rect x="74" y="32" width="2" height="456" fill="#ffffff" opacity="0.2"/>

        <!-- Wrapped Wire -->
        <line x1="70" y1="130" x2="86" y2="140" stroke="#ffca28" stroke-width="2.5"/>
        <line x1="70" y1="150" x2="86" y2="160" stroke="#ffca28" stroke-width="2.5"/>
        <line x1="70" y1="170" x2="86" y2="180" stroke="#ffca28" stroke-width="2.5"/>
        <circle cx="70" cy="130" r="3" fill="#ff0000" filter="url(#glow)"/>

        <!-- Flag Attachment Rings -->
        <ellipse cx="78" cy="70" rx="11" ry="4" fill="none" stroke="#666" stroke-width="3"/>
        <ellipse cx="78" cy="340" rx="11" ry="4" fill="none" stroke="#666" stroke-width="3"/>

        <!-- Top Finial -->
        <circle cx="78" cy="30" r="14" fill="#222" filter="url(#shadow)"/>
        <circle cx="78" cy="30" r="8" fill="#ff0000" filter="url(#glow)">
            <animate attributeName="fill" values="#ff0000;#ffaaaa;#ff0000" dur="1.5s" repeatCount="indefinite"/>
            <animate attributeName="r" values="8;9;8" dur="1.5s" repeatCount="indefinite"/>
        </circle>
        <circle cx="78" cy="28" r="3" fill="#ffffff" opacity="0.8"/>
    </g>
</svg>